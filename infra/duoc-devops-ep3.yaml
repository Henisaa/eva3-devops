AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EP3 - Plataforma DevOps en AWS (Tienda Semestral: Ventas + Despachos).
  Crea Red (VPC multi-AZ) + ECR (4 repos) + Clúster EKS administrado con Node Group y Addons.

Parameters:

  EksClusterRoleName:
    Type: String
    Description: Nombre del rol IAM para el cluster EKS (sin el prefijo ARN). En AWS Academy suele ser LabRole.
    MinLength: 1

  EksNodeRoleName:
    Type: String
    Description: Nombre del rol IAM para el node group de EKS (sin el prefijo ARN). En AWS Academy suele ser LabRole.
    MinLength: 1

  PipelineRoleName:
    Type: String
    Default: voclabs
    Description: >
      Nombre del rol IAM con el que corren las pipelines de GitHub Actions y la consola/CloudShell
      de AWS Academy. En Academy es 'voclabs'. Se le concede admin del clúster vía Access Entry
      para que 'kubectl' (set image / rollout) funcione desde CI/CD.
    MinLength: 1

Resources:

  #################################
  # VPC
  #################################

  DevOpsVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: devopsvpc

  #################################
  # INTERNET GATEWAY
  #################################

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: devops-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref DevOpsVPC
      InternetGatewayId: !Ref InternetGateway

  #################################
  # PUBLIC SUBNETS (para el ELB público del Frontend)
  #################################

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevOpsVPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-a
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: kubernetes.io/cluster/devopseks
          Value: "shared"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevOpsVPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-b
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: kubernetes.io/cluster/devopseks
          Value: "shared"

  #################################
  # PRIVATE SUBNETS AZ A (nodos del clúster)
  #################################

  PrivateSubnetA1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevOpsVPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.11.0/24
      Tags:
        - Key: Name
          Value: private-subnet-a1
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: kubernetes.io/cluster/devopseks
          Value: "shared"

  PrivateSubnetA2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevOpsVPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.12.0/24
      Tags:
        - Key: Name
          Value: private-subnet-a2
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: kubernetes.io/cluster/devopseks
          Value: "shared"

  #################################
  # PRIVATE SUBNETS AZ B (nodos del clúster)
  #################################

  PrivateSubnetB1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevOpsVPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.21.0/24
      Tags:
        - Key: Name
          Value: private-subnet-b1
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: kubernetes.io/cluster/devopseks
          Value: "shared"

  PrivateSubnetB2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevOpsVPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.22.0/24
      Tags:
        - Key: Name
          Value: private-subnet-b2
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: kubernetes.io/cluster/devopseks
          Value: "shared"

  #################################
  # NAT GATEWAY (salida a Internet de las subredes privadas)
  #################################

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: devops-nat-eip

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: VPCGatewayAttachment
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: devops-nat

  #################################
  # PUBLIC ROUTE TABLE
  #################################

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DevOpsVPC
      Tags:
        - Key: Name
          Value: public-route-table

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  #################################
  # PRIVATE ROUTE TABLE
  #################################

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DevOpsVPC
      Tags:
        - Key: Name
          Value: private-route-table

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: NatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  #################################
  # PUBLIC ASSOCIATIONS
  #################################

  PublicSubnetAAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicSubnetBAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  #################################
  # PRIVATE ASSOCIATIONS
  #################################

  PrivateSubnetA1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetA1

  PrivateSubnetA2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetA2

  PrivateSubnetB1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetB1

  PrivateSubnetB2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetB2

  #################################
  # ECR REPOSITORIES (4 imágenes Docker)
  #################################

  FrontendRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: tienda-frontend

  BackendVentasRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: tienda-backend-ventas

  BackendDespachosRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: tienda-backend-despachos

  DbRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: tienda-db

  #####################################################
  # EKS CLUSTER
  #####################################################

  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: devopseks
      Version: "1.31"
      RoleArn: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${EksClusterRoleName}'
      # Access Entries (modo API) en lugar del aws-auth legacy.
      # BootstrapClusterCreatorAdminPermissions=false evita que EKS cree una entry
      # automática para el rol creador (LabRole, que tambien es rol de nodos) -> sin conflicto.
      # El admin se concede explicitamente al rol del pipeline (voclabs) mas abajo.
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
        BootstrapClusterCreatorAdminPermissions: false
      ResourcesVpcConfig:
        EndpointPrivateAccess: true
        EndpointPublicAccess: true
        SubnetIds:
          - !Ref PublicSubnetA
          - !Ref PublicSubnetB
          - !Ref PrivateSubnetA1
          - !Ref PrivateSubnetA2
          - !Ref PrivateSubnetB1
          - !Ref PrivateSubnetB2
      # Logging del control plane -> CloudWatch (requisito IE6: logs y métricas)
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler

  #####################################################
  # MANAGED NODE GROUP
  #####################################################

  EKSNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn:
      - EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      NodegroupName: devops-nodegroup
      NodeRole: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${EksNodeRoleName}'
      CapacityType: ON_DEMAND
      InstanceTypes:
        - t3.large
      AmiType: AL2023_x86_64_STANDARD
      DiskSize: 20
      # ScalingConfig: límites del autoscaling a nivel de NODOS (infraestructura).
      # El HPA escala PODS; este bloque garantiza nodos donde ubicarlos.
      # 4 microservicios (2 réplicas c/u) + MySQL => mínimo 2 nodos t3.large.
      ScalingConfig:
        MinSize: 2
        DesiredSize: 2
        MaxSize: 4
      UpdateConfig:
        MaxUnavailable: 1
      Labels:
        environment: lab
      Subnets:
        - !Ref PrivateSubnetA1
        - !Ref PrivateSubnetA2
        - !Ref PrivateSubnetB1
        - !Ref PrivateSubnetB2

  #####################################################
  # ACCESS ENTRY: admin del clúster para el rol del pipeline
  #####################################################
  # Autoriza a 'voclabs' (GitHub Actions / CloudShell de Academy) dentro del RBAC
  # de Kubernetes. Sin esto, 'kubectl' falla con "the server has asked for the
  # client to provide credentials" aunque las credenciales IAM/ECR sean válidas.

  PipelineAccessEntry:
    Type: AWS::EKS::AccessEntry
    DependsOn:
      - EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      PrincipalArn: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${PipelineRoleName}'
      Type: STANDARD
      AccessPolicies:
        # OJO: las access policies de EKS NO son políticas IAM; usan este ARN especial
        # (arn:aws:eks::aws:cluster-access-policy/...), no arn:aws:iam::aws:policy/...
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope:
            Type: cluster

  #####################################################
  # ADDONS
  #####################################################

  VpcCniAddon:
    Type: AWS::EKS::Addon
    DependsOn:
      - EKSNodeGroup
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: vpc-cni

  CoreDnsAddon:
    Type: AWS::EKS::Addon
    DependsOn:
      - EKSNodeGroup
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: coredns

  KubeProxyAddon:
    Type: AWS::EKS::Addon
    DependsOn:
      - EKSNodeGroup
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: kube-proxy

  PodIdentityAddon:
    Type: AWS::EKS::Addon
    DependsOn:
      - EKSNodeGroup
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: eks-pod-identity-agent

  CloudWatchObservabilityAddon:
    Type: AWS::EKS::Addon
    DependsOn:
      - EKSNodeGroup
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: amazon-cloudwatch-observability

Outputs:

  VpcId:
    Description: VPC ID
    Value: !Ref DevOpsVPC
    Export:
      Name: devops-vpc-id

  PrivateSubnets:
    Description: All private subnets
    Value: !Join
      - ","
      - - !Ref PrivateSubnetA1
        - !Ref PrivateSubnetA2
        - !Ref PrivateSubnetB1
        - !Ref PrivateSubnetB2

  ClusterName:
    Description: EKS Cluster Name
    Value: !Ref EKSCluster

  ClusterArn:
    Description: EKS Cluster ARN
    Value: !GetAtt EKSCluster.Arn

  ClusterEndpoint:
    Description: Kubernetes API Endpoint
    Value: !GetAtt EKSCluster.Endpoint

  ClusterSecurityGroup:
    Description: Cluster Security Group
    Value: !GetAtt EKSCluster.ClusterSecurityGroupId

  NodeGroupName:
    Description: Managed Node Group Name
    Value: !Ref EKSNodeGroup

  FrontendRepoUri:
    Description: URI del repo ECR del frontend
    Value: !GetAtt FrontendRepo.RepositoryUri

  BackendVentasRepoUri:
    Description: URI del repo ECR backend ventas
    Value: !GetAtt BackendVentasRepo.RepositoryUri

  BackendDespachosRepoUri:
    Description: URI del repo ECR backend despachos
    Value: !GetAtt BackendDespachosRepo.RepositoryUri

  DbRepoUri:
    Description: URI del repo ECR de la base de datos
    Value: !GetAtt DbRepo.RepositoryUri
