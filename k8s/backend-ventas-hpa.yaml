apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tienda-backend-ventas-hpa
  namespace: tienda
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tienda-backend-ventas
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # 70% sobre el request (250m). Umbral conservador para microservicio
          # Spring Boot: deja margen ante picos sin sobre-aprovisionar nodos.
          averageUtilization: 70
