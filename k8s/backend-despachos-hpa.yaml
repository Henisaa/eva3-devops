apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tienda-backend-despachos-hpa
  namespace: tienda
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tienda-backend-despachos
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
