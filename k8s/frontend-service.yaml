apiVersion: v1
kind: Service
metadata:
  name: tienda-frontend
  namespace: tienda
spec:
  # LoadBalancer: AWS provisiona un ELB público y entrega un DNS externo.
  # Esa URL es el ÚNICO acceso público del sistema (requisito IE2 / IE7).
  type: LoadBalancer
  selector:
    app: tienda-frontend
  ports:
    - port: 80
      targetPort: 80
