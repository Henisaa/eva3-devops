# PLANTILLA / EJEMPLO — NO contiene credenciales reales y NO se aplica directamente.
#
# El Secret real NO se versiona en git. Se crea en tiempo de despliegue:
#   - En el bootstrap: scripts/deploy.sh lo genera con `kubectl create secret`
#     leyendo la variable de entorno DB_PASSWORD.
#   - En CI/CD: el workflow lo crea/actualiza desde el GitHub Secret DB_PASSWORD.
#
# Para crearlo manualmente:
#   kubectl create secret generic mysql-secret \
#     --namespace tienda \
#     --from-literal=MYSQL_ROOT_PASSWORD='TU_PASSWORD_SEGURO'
#
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: tienda
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "CAMBIAR_EN_DESPLIEGUE"
