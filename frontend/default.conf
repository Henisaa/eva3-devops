# NGINX del frontend ADAPTADO PARA EKS.
#
# En EVA2 (EC2) este archivo apuntaba a una IP fija (http://10.0.137.73:8080...).
# En EKS se usa el DNS interno de Kubernetes: cada backend es un Service y se
# resuelve por su nombre dentro del namespace "tienda".
#
# >>> Reemplazar el archivo frontend/default.conf del repo por este antes de
#     construir la imagen del frontend para el despliegue en EKS. <<<

server {
    listen 80;
    server_name _;
    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy hacia el microservicio de Ventas (Service ClusterIP, puerto 8080)
    location /api/v1/ventas {
        proxy_pass http://tienda-backend-ventas:8080/api/v1/ventas;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # Proxy hacia el microservicio de Despachos (Service ClusterIP, puerto 8081)
    location /api/v1/despachos {
        proxy_pass http://tienda-backend-despachos:8081/api/v1/despachos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # SPA React (Vite): cualquier ruta no-API cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
